name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# NOTE: 最小権限 permissions:{contents:read} を入れると、private リポジトリでは
# hacs/action が GitHub API 経由で hacs.json/manifest.json を取得できず誤判定する。
# public 化後に `permissions: contents: read` を追加してサプライチェーンを締める想定。
# 代替の恒久ハードニングとして各 action の SHA ピン留めも検討可（README/ロードマップ参照）。

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # brands は home-assistant/brands 登録が必要でデフォルトストア用要件。
          # カスタムリポジトリ導入には不要なため CI では無視（公開時に対応）。
          ignore: brands
