name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# 最小権限（サプライチェーン対策）: 検証のみで書き込み不要。
permissions:
  contents: read

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    # NOTE: hacs/action は GitHub API 経由で hacs.json/manifest.json を取得するため、
    # private リポジトリでは取得不可（Got None）で誤判定する。HACS 検証は public 前提。
    # public 化までは非ブロッキングにし、公開時に continue-on-error を外して必須化する。
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # brands は home-assistant/brands 登録が必要（デフォルトストア要件）。
          # カスタムリポジトリ導入には不要なため無視。公開時に brands 登録で対応。
          ignore: brands
