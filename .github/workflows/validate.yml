name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# 最小権限: 検証のみで書き込み不要。Action が侵害されても
# GITHUB_TOKEN で push/release/comment できないようにする。
permissions:
  contents: read

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # brands は home-assistant/brands 登録が必要でデフォルトストア用要件。
          # カスタムリポジトリ導入には不要なため CI では無視（公開時に対応）。
          ignore: brands
